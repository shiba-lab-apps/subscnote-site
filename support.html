<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>サポート | サブスクノート</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrapper">
    <main class="card">
      <div class="badge">Support</div>
      <h1>サポート</h1>
      <p>サブスクノートは App Store 向けに提供される iPhone / iPad アプリです。このページでは、利用者向けのサポート案内を提供します。</p>
      <h2>お問い合わせについて</h2>
      <p>アプリの動作不良、表示の問題、利用方法に関するお問い合わせは、アプリ内の案内または配布ページの情報をもとにご連絡ください。</p>
      <h2>サポート対象</h2>
      <ul>
        <li>アプリの起動や動作に関する問題</li>
        <li>データ表示・入力に関する不具合</li>
        <li>操作方法や機能に関する質問</li>
      </ul>
      <h2>お願い</h2>
      <p>お問い合わせ時には、利用している端末、iOS バージョン、発生している状況をできる範囲でご共有ください。</p>
      <p><a class="button" href="index.html">トップへ戻る</a></p>
    </main>
  </div>
</body>
</html>
